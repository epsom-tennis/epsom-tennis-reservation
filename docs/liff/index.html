window.addEventListener('load', function() {
  var loadTimer = setTimeout(function() {
    var ld = document.getElementById('loading');
    if (ld && ld.style.display !== 'none') {
      ld.innerHTML =
        '<div style="color:#c00;font-size:14px;line-height:1.8;padding:10px 0">' +
        '⚠️ 読み込みがタイムアウトしました。<br><br>' +
        'LINEアプリを完全に閉じてから<br>再度開いてください。<br><br>' +
        '<button onclick="location.reload()" style="background:#06c755;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:15px;font-weight:bold">再読み込み</button>' +
        '</div>';
    }
  }, 15000);

  liff.init({ liffId: LIFF_ID })
    .then(function() {
      if (!liff.isLoggedIn()) { liff.login(); return; }
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return;
      userId = profile.userId;
      // 起動ログ（fire-and-forget）
      fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
        action: 'logEvent', userId: userId, actionType: 'LIFF起動',
        eventId: getLiffUrlParam('type') || getLiffUrlParam('page') || '',
        detail:  getLiffUrlParam('consult') || ''
      }) }).catch(function(){});
      var fetchTimeout = new Promise(function(_, reject) {
        setTimeout(function() { reject(new Error('サーバーの応答がありませんでした（タイムアウト）')); }, 10000);
      });
      return Promise.race([
        Promise.all([
          fetch(GAS_URL + '?action=getEvents&userId=' + encodeURIComponent(userId)).then(function(r){ return r.json(); }),
          fetch(GAS_URL + '?action=getMember&userId=' + encodeURIComponent(userId)).then(function(r){ return r.json(); })
        ]),
        fetchTimeout
      ]);
    })
    .then(function(results) {
      clearTimeout(loadTimer);
      if (!results) return;
      eventsData = results[0] || [];
      memberData = results[1] || null;
      if (new URLSearchParams(window.location.search).get('test') === 'first') memberData = null;
      renderForm();
    })
    .catch(function(e) {
      clearTimeout(loadTimer);
      showErr('読み込みに失敗しました。LINEアプリを完全に閉じてから再度開いてください。\n\n(' + (e && e.message ? e.message : String(e)) + ')');
    });
});

// ========== HTML生成ユーティリティ ==========

function h(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function rv(nm) { var el = document.querySelector('input[name="' + nm + '"]:checked'); return el ? el.value : ''; }
function chk(nm) { return Array.from(document.querySelectorAll('input[name="' + nm + '"]:checked')).map(function(el){return el.value;}); }

function radioHtml(name, opts, selected) {
  return opts.map(function(o) {
    return '<label class="opt"><input type="radio" name="' + name + '" value="' + h(o) + '"' + (selected === o ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
}

function checkboxHtml(name, opts, selected) {
  return opts.map(function(o) {
    return '<label class="opt"><input type="checkbox" name="' + name + '" value="' + h(o) + '"' + (selected.indexOf(o) !== -1 ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
}

function checkboxWithOtherHtml(nameBase, opts, selected, idx) {
  var otherSelected = selected.filter(function(v){ return v.startsWith('その他'); });
  var otherText = otherSelected.length > 0 ? otherSelected[0].replace(/^その他（/, '').replace(/）$/, '') : '';
  var hasOther = otherSelected.length > 0 || selected.indexOf('その他') !== -1;
  var html = opts.map(function(o) {
    return '<label class="opt"><input type="checkbox" name="' + nameBase + '_' + idx + '" value="' + h(o) + '"' + (selected.indexOf(o) !== -1 ? ' checked' : '') + '><span>' + h(o) + '</span></label>';
  }).join('');
  html += '<label class="opt"><input type="checkbox" name="' + nameBase + '_' + idx + '" value="その他" onchange="toggleOtherInput(\'' + nameBase + '\',' + idx + ')"' + (hasOther ? ' checked' : '') + '><span>その他</span></label>';
  html += '<div id="' + nameBase + 'OtherWrap_' + idx + '" class="other-input"' + (hasOther ? '' : ' style="display:none"') + '>';
  html += '<input type="text" id="' + nameBase + 'OtherText_' + idx + '" placeholder="具体的に入力してください" value="' + h(otherText) + '">';
  html += '</div>';
  return html;
}

function getLiffUrlParam(key) {
  try {
    var direct = new URLSearchParams(location.search).get(key);
    if (direct) return decodeURIComponent(direct);
    var state = new URLSearchParams(location.search).get('liff.state');
    if (state) return new URLSearchParams(decodeURIComponent(state)).get(key);
  } catch(e) {}
  return null;
}

function applyUrlEventPreselect() {
  var evName = getLiffUrlParam('event');
  if (!evName) return;
  for (var i = 0; i < eventsData.length; i++) {
    if (eventsData[i].name === evName) {
      var cb = document.querySelector('input[name="ev"][value="' + i + '"]');
      if (cb && !cb.checked) {
        cb.checked = true;
        onEventToggle(i);
        cb.closest('.ev-opt') && cb.closest('.ev-opt').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      break;
    }
  }
}

function applyUrlConsultPreselect() {
  if (!_consultParam) return;
  // オンラインイベントが1件のみなら自動チェックしてフィールドを表示
  var onlineCbs = Array.from(document.querySelectorAll('input[name="ev"]')).filter(function(cb) {
    var ev = eventsData[parseInt(cb.value)];
    return ev && (ev.eventType || 'オフライン') === 'オンライン';
  });
  if (onlineCbs.length === 1 && !onlineCbs[0].checked) {
    onlineCbs[0].checked = true;
    onEventToggle(parseInt(onlineCbs[0].value));
    // onEventToggle → updateOnlineFields の中で _consultParam による自動選択が走る
    return;
  }
  // 複数または既にチェック済みの場合はラジオだけ適用
  var preRad = document.querySelector('input[name="onConsultType"][value="' + _consultParam + '"]');
  if (preRad) { preRad.checked = true; updateConsultType(); }
}

function buildEventsHtml() {
  var typeParam = getLiffUrlParam('type');
  var offline = eventsData.filter(function(ev) { return (ev.eventType || 'オフライン') !== 'オンライン'; });
  var online  = eventsData.filter(function(ev) { return (ev.eventType || 'オフライン') === 'オンライン'; });
  if (typeParam === 'online')  return buildEventGroupHtml('💻 オンラインイベント', online);
  if (typeParam === 'offline') return buildEventGroupHtml('📍 オフラインイベント', offline);
  return buildEventGroupHtml('📍 オフラインイベント', offline) +
         buildEventGroupHtml('💻 オンラインイベント', online);
}

function buildEventGroupHtml(label, events) {
  var header = '<div style="font-size:13px;font-weight:bold;color:#444;padding:8px 2px 8px;border-bottom:1px solid #e8e8e8;margin-bottom:10px">' + label + '</div>';
  if (events.length === 0) {
    return '<div style="margin-bottom:14px">' + header +
      '<p style="color:#aaa;font-size:13px;padding:2px 2px 4px;text-align:center">現在募集中のイベントはございません。</p></div>';
  }
  return '<div style="margin-bottom:14px">' + header +
    events.map(function(ev) { return buildSingleEventHtml(ev, eventsData.indexOf(ev)); }).join('') +

function collectParticipant(idx) {
  return {
    familyName:    val('fN_' + idx),
    givenName:     val('gN_' + idx),
    familyNameKana:val('fK_' + idx),
    givenNameKana: val('gK_' + idx),
    age:           val('age_' + idx),
    gender:        rv('gnd_' + idx),
    tennisLevel:   rv('lv_' + idx),
    email:         val('email_' + idx),
    phone:         val('phone_' + idx),
    emergency:     val('emergency_' + idx),
    tennisFreq:    rv('freq_' + idx),
    tennisHistory: rv('hist_' + idx),
    tennisArea:    getCheckboxWithOther('area', idx),
    tennisEnv:     getCheckboxWithOther('env', idx),
  };
}

function validateParticipant(p, idx, errs) {
  var label = idx === 1 ? '' : '（参加者' + idx + '）';
  if (!p.familyName || !p.givenName) errs.push('お名前を入力してください。' + label);
  if (!p.familyNameKana || !p.givenNameKana) errs.push('フリガナを入力してください。' + label);
  if (!p.age)          errs.push('年齢を入力してください。' + label);
  if (!p.gender)       errs.push('性別を選択してください。' + label);
  if (!p.email)        errs.push('メールアドレスを入力してください。' + label);
  if (!p.phone)        errs.push('電話番号を入力してください。' + label);
  var ageNum = parseInt(p.age);
  if (!isNaN(ageNum) && ageNum <= 18 && !p.emergency) errs.push('18歳以下の方は緊急連絡先が必須です。' + label);
  if (!p.tennisLevel)  errs.push('テニスレベルを選択してください。' + label);
  if (!p.tennisFreq)   errs.push('テニスをプレイする頻度を選択してください。' + label);
  if (!p.tennisHistory) errs.push('テニス歴を選択してください。' + label);
  if (!p.tennisArea  || p.tennisArea.length  === 0) errs.push('テニスをしている地域を選択してください。' + label);
  if (!p.tennisEnv   || p.tennisEnv.length   === 0) errs.push('テニスをプレイしている環境を選択してください。' + label);
}

function memberDataToParticipant(m) {
  var np = (m.name || '').split(' ');
  var fp = (m.furigana || '').split(' ');
  return {
    familyName:     np[0] || '',
    givenName:      np.slice(1).join(' ') || '',
    familyNameKana: fp[0] || '',
    givenNameKana:  fp.slice(1).join(' ') || '',
    age:            String(m.age || ''),
    gender:         m.gender || '',
    tennisLevel:    m.tennisLevel || '',
    email:          m.email || '',
    phone:          m.phone || '',
    emergency:      m.emergency || '',
    tennisFreq:     m.tennisFreq || '',
    tennisHistory:  m.tennisHistory || '',
    tennisArea:     (m.tennisArea || '').split('・').filter(Boolean),
    tennisEnv:      (m.tennisEnv  || '').split('・').filter(Boolean),
  };
}

// ========== プロフィール登録送信（初回）==========

function doSubmitProfile() {
  var btn = document.getElementById('sbtn'), gerr = document.getElementById('gerr');
  gerr.style.display = 'none';

  var mainP = collectParticipant(1);
  var additionals = [];
  for (var i = 2; i <= participantCount; i++) {
    if (document.getElementById('p_section_' + i)) additionals.push(collectParticipant(i));
  }

  var errs = [];
  validateParticipant(mainP, 1, errs);
  additionals.forEach(function(p, i){ validateParticipant(p, i + 2, errs); });

  var tos = document.getElementById('tos').checked;
  if (!tos) errs.push('利用規約への同意が必要です。');

  if (errs.length) {
    gerr.innerHTML = errs.join('<br>');
    gerr.style.display = 'block';
    gerr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  btn.disabled = true; btn.textContent = '登録中...';

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submitLiff',
      userId: userId,
      idToken: liff.getIDToken(),
      familyName: mainP.familyName, givenName: mainP.givenName,
      familyNameKana: mainP.familyNameKana, givenNameKana: mainP.givenNameKana,
      age: mainP.age, gender: mainP.gender, tennisLevel: mainP.tennisLevel,
      email: mainP.email, phone: mainP.phone, emergency: mainP.emergency,
      tennisFreq: mainP.tennisFreq, tennisHistory: mainP.tennisHistory,
      tennisArea: mainP.tennisArea, tennisEnv: mainP.tennisEnv,
      additionalParticipants: additionals,
      selectedEvents: [],
      isNewRegistration: true,
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    if (res.success) {
      showPostRegistration(mainP, additionals);
    } else {
      btn.disabled = false; btn.textContent = '登録する';
      gerr.textContent = res.error || '送信に失敗しました。再度お試しください。';
      gerr.style.display = 'block';
    }
  })
  .catch(function() {
    btn.disabled = false; btn.textContent = '登録する';
    gerr.textContent = '通信エラーが発生しました。再度お試しください。';
    gerr.style.display = 'block';
  });
}

// ========== プロフィール更新送信（?page=profile）==========

function doUpdateProfile() {
  var btn = document.getElementById('sbtn'), gerr = document.getElementById('gerr');
  gerr.style.display = 'none';

  var mainP = collectParticipant(1);
  var additionals = [];
  for (var i = 2; i <= participantCount; i++) {
    if (document.getElementById('p_section_' + i)) additionals.push(collectParticipant(i));
  }

  var errs = [];
  validateParticipant(mainP, 1, errs);
  additionals.forEach(function(p, i){ validateParticipant(p, i + 2, errs); });

  if (errs.length) {
    gerr.innerHTML = errs.join('<br>');
    gerr.style.display = 'block';
    gerr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  btn.disabled = true; btn.textContent = '更新中...';

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submitLiff',
      userId: userId,
      idToken: liff.getIDToken(),
      familyName: mainP.familyName, givenName: mainP.givenName,
      familyNameKana: mainP.familyNameKana, givenNameKana: mainP.givenNameKana,
      age: mainP.age, gender: mainP.gender, tennisLevel: mainP.tennisLevel,
      email: mainP.email, phone: mainP.phone, emergency: mainP.emergency,
      tennisFreq: mainP.tennisFreq, tennisHistory: mainP.tennisHistory,
      tennisArea: mainP.tennisArea, tennisEnv: mainP.tennisEnv,
      additionalParticipants: additionals,
      selectedEvents: [],
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    if (res.success) {
      memberData = buildMemberDataFromParticipant_(mainP, additionals);
      document.getElementById('fw').style.display = 'none';
      document.getElementById('stitle').textContent = '更新完了！';
      document.getElementById('sbody').textContent = 'プロフィール情報を更新しました。\nありがとうございます！';
      document.getElementById('success').style.display = '';
      document.getElementById('saction').innerHTML = '';
    } else {
      btn.disabled = false; btn.textContent = 'プロフィールを更新する';
      gerr.textContent = res.error || '送信に失敗しました。再度お試しください。';
      gerr.style.display = 'block';
    }
  })
  .catch(function() {
    btn.disabled = false; btn.textContent = 'プロフィールを更新する';
    gerr.textContent = '通信エラーが発生しました。再度お試しください。';
    gerr.style.display = 'block';
  });
}

// ========== 初回登録後の画面遷移 ==========

function buildMemberDataFromParticipant_(mainP, additionals) {
  return {
    name: (mainP.familyName + ' ' + mainP.givenName).trim(),
    furigana: (mainP.familyNameKana + ' ' + mainP.givenNameKana).trim(),
    age: mainP.age, gender: mainP.gender, tennisLevel: mainP.tennisLevel,
    email: mainP.email, phone: mainP.phone, emergency: mainP.emergency,
    tennisFreq: mainP.tennisFreq, tennisHistory: mainP.tennisHistory,
    tennisArea: (mainP.tennisArea || []).join('・'),
    tennisEnv:  (mainP.tennisEnv  || []).join('・'),
    additionalParticipants: (additionals || []).map(function(p) {
      return {
        name: (p.familyName + ' ' + p.givenName).trim(),
        furigana: (p.familyNameKana + ' ' + p.givenNameKana).trim(),
        age: p.age, gender: p.gender, tennisLevel: p.tennisLevel,
        email: p.email, phone: p.phone, emergency: p.emergency,
        tennisFreq: p.tennisFreq, tennisHistory: p.tennisHistory,
        tennisArea: (p.tennisArea || []).join('・'),
        tennisEnv:  (p.tennisEnv  || []).join('・'),
      };
    }),
  };
}

function showPostRegistration(mainP, additionals) {
  memberData = buildMemberDataFromParticipant_(mainP, additionals);

  document.getElementById('fw').style.display = 'none';
  document.getElementById('stitle').textContent = '登録完了！';

  if (eventsData.length > 0) {
    document.getElementById('sbody').textContent = 'プロフィールを登録しました。\n続けてイベントにご応募いただけます。';
    document.getElementById('saction').innerHTML =
      '<button class="btn" style="max-width:300px;margin:20px auto 0;display:block" onclick="switchToEntry()">続けてイベントに応募する →</button>';
  } else {
    document.getElementById('sbody').textContent =
      'プロフィールを登録しました！\nありがとうございます。\n\nイベント開催の際は\nこちらのページからご応募いただけます。';
  }

  document.getElementById('success').style.display = '';
}

function switchToEntry() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('saction').innerHTML = '';
  participantCount = 1;
  profileAccordionOpen = false;
  renderForm();
}

// ========== イベント応募送信 ==========

function doSubmit() {
  var btn = document.getElementById('sbtn'), gerr = document.getElementById('gerr');
  gerr.style.display = 'none';

  // 応募ボタン押下ログ（fire-and-forget）
  var _logEvNames = chk('ev').map(function(i){ var ev = eventsData[parseInt(i)]; return ev ? ev.name : ''; }).filter(Boolean).join('、');
  fetch(GAS_URL, { method: 'POST', body: JSON.stringify({
    action: 'logEvent', userId: userId, actionType: '応募ボタン押下',
    eventId: _logEvNames, detail: rv('onConsultType') || ''
  }) }).catch(function(){});

  var errs = [];
  var mainP = collectParticipant(1);
  var accordionVisible = (function() {
    var panel = document.getElementById('profileAccordion');
    return panel && panel.style.display !== 'none';
  })();
  if (accordionVisible) {
    validateParticipant(mainP, 1, errs);
  }

  var additionals = [];
  for (var i = 2; i <= participantCount; i++) {
    if (document.getElementById('p_section_' + i)) {
      var p = collectParticipant(i);
      validateParticipant(p, i, errs);
      additionals.push(p);
    }
  }

  var evIdxs = chk('ev');

  evIdxs.forEach(function(i) {
    var idx = parseInt(i);
    var evName = eventsData[idx] ? eventsData[idx].name : ('イベント' + (idx + 1));
    if (chk('ev_p_' + idx).length === 0) errs.push('「' + evName + '」応募する参加者を選択してください。');
    if (!rv('coach_' + idx)) errs.push('「' + evName + '」コーチのレッスンについて回答してください。');
    if (chk('src_' + idx).length === 0) errs.push('「' + evName + '」イベントを知ったきっかけを選択してください。');
    if (chk('rsn_' + idx).length === 0) errs.push('「' + evName + '」参加応募のきっかけを選択してください。');
  });

  var hasOfflineEv = evIdxs.some(function(i) { var ev = eventsData[parseInt(i)]; return ev && (ev.eventType || 'オフライン') !== 'オンライン'; });
  var hasOnlineEv  = evIdxs.some(function(i) { var ev = eventsData[parseInt(i)]; return ev && (ev.eventType || 'オフライン') === 'オンライン'; });
  if (hasOfflineEv) {
    var oTos = document.getElementById('tos_offline'); var oCons = document.getElementById('mediaCons');
    if (!oTos || !oTos.checked)  errs.push('オフラインイベントの利用規約への同意が必要です。');
    if (!oCons || !oCons.checked) errs.push('撮影・インタビューへの協力同意が必要です。');
  }
  if (hasOnlineEv) {
    var nTos = document.getElementById('tos_online'); var nCons = document.getElementById('videoCons');
    if (!nTos || !nTos.checked)  errs.push('ビデオ相談企画の応募規約への同意が必要です。');
    if (!nCons || !nCons.checked) errs.push('動画・配信利用への同意が必要です。');
    if (!val('onBroadcastName')) errs.push('配信・動画内でお呼びするお名前を入力してください。');
    if (!rv('onConsultType'))    errs.push('ご相談方法を選択してください。');
    if (!val('onConcern'))       errs.push('お悩み内容を入力してください。');
    if (rv('onConsultType') === 'video') {
      if (!rv('onPhoneConsult')) errs.push('電話でのご相談希望を選択してください。');
      else if (rv('onPhoneConsult') === '希望する' && !val('onConsultPhone')) errs.push('かけてほしい電話番号を入力してください。');
    }
  }

  if (errs.length) {
    gerr.innerHTML = errs.join('<br>');
    gerr.style.display = 'block';
    gerr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  var broadcastName = hasOnlineEv ? val('onBroadcastName') : '';
  var consultType   = hasOnlineEv ? rv('onConsultType')    : '';
  var mainName      = ((mainP.familyName || '') + (mainP.givenName || '')).trim();

  btn.disabled = true; btn.textContent = '送信中...';

  var selEvs = evIdxs.map(function(i) {
    var idx = parseInt(i);
    return Object.assign({}, eventsData[idx], {
      coachKnowledge:  rv('coach_' + idx),
      eventSource:     chk('src_' + idx),
      applyReason:     chk('rsn_' + idx),
      participantNums: chk('ev_p_' + idx).map(function(v){ return parseInt(v); }),
    });
  });

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'submitLiff',
      userId: userId,
      idToken: liff.getIDToken(),
      familyName: mainP.familyName, givenName: mainP.givenName,
      familyNameKana: mainP.familyNameKana, givenNameKana: mainP.givenNameKana,
      age: mainP.age, gender: mainP.gender, tennisLevel: mainP.tennisLevel,
      email: mainP.email, phone: mainP.phone, emergency: mainP.emergency,
      tennisFreq: mainP.tennisFreq, tennisHistory: mainP.tennisHistory,
      tennisArea: mainP.tennisArea, tennisEnv: mainP.tennisEnv,
      additionalParticipants: additionals,
      selectedEvents: selEvs,
      onlineBroadcastName: broadcastName,
      onlineConsultType:   consultType,
      onlineConcern:       val('onConcern'),
      onlinePhoneConsult:  consultType === 'video' ? rv('onPhoneConsult')  : '',
      onlineConsultPhone:  consultType === 'video' ? val('onConsultPhone') : '',
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    if (res.success) {
      memberData = buildMemberDataFromParticipant_(mainP, additionals);
      if (hasOfflineEv) setTosAgreed('offline');
      if (hasOnlineEv)  setTosAgreed('online');
      document.getElementById('fw').style.display = 'none';
      var applied = res.appliedEvents || [];
      document.getElementById('stitle').textContent = '応募を受け付けました！';
      var lines = [];
      if (mainName) lines.push(mainName + '様');
      if (broadcastName) lines.push('動画内でお呼びするお名前：' + broadcastName + '様');
      if (applied.length > 0) {
        lines.push('応募イベント:\n' + applied.map(function(n){ return '・' + n; }).join('\n'));
        lines.push(consultType === 'video'
          ? 'このLINEに動画を送ってください 🎥\nコーチが確認します。'
          : '当落結果はLINEでお知らせします。\nしばらくお待ちください。');
      } else {
        lines.push('プロフィール情報を更新しました。\nありがとうございます！');
      }
      document.getElementById('sbody').textContent = lines.join('\n\n');
      document.getElementById('success').style.display = '';
      document.getElementById('saction').innerHTML =
        '<button class="btn" style="max-width:300px;margin:20px auto 0;display:block;background:#4a90d9" onclick="reApply()">続けて別の応募をする</button>';
    } else {
      btn.disabled = false; btn.textContent = '応募する';
      gerr.textContent = res.error || '送信に失敗しました。再度お試しください。';
      gerr.style.display = 'block';
    }
  })
  .catch(function() {
    btn.disabled = false; btn.textContent = '応募する';
    gerr.textContent = '通信エラーが発生しました。再度お試しください。';
    gerr.style.display = 'block';
  });
}

// ========== 応募後の再応募 ==========

function reApply() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('saction').innerHTML = '';
  document.getElementById('fw').style.display = 'none';
  document.getElementById('loading').style.display = '';
  participantCount = 1;
  profileAccordionOpen = false;

  fetch(GAS_URL + '?action=getEvents&userId=' + encodeURIComponent(userId))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      eventsData = data || [];
      document.getElementById('loading').style.display = 'none';
      renderForm();
    })
    .catch(function() {
      document.getElementById('loading').style.display = 'none';
      showErr('イベント情報の再取得に失敗しました。もう一度LINEから開き直してください。');
    });
}

function showErr(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('emsg').textContent = msg;
  document.getElementById('errscr').style.display = '';
}
</script>
